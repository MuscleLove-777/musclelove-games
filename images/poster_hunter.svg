<svg xmlns="http://www.w3.org/2000/svg" width="640" height="420" viewBox="0 0 640 420" role="img" aria-labelledby="title desc">
  <title id="title">筋肉ハンター</title>
  <desc id="desc">筋肉美女ハンターがモンスターを狩りビキニと武器を生産する狩猟アクション</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#16240f"/>
      <stop offset="0.6" stop-color="#2c3c14"/>
      <stop offset="1" stop-color="#5d4a18"/>
    </linearGradient>
    <linearGradient id="skin" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#e8a87c"/>
      <stop offset="1" stop-color="#c98a5e"/>
    </linearGradient>
  </defs>
  <rect width="640" height="420" fill="url(#bg)"/>
  <circle cx="520" cy="80" r="52" fill="#f5e6b8" opacity="0.85"/>

  <!-- dragon silhouette -->
  <g fill="#10160a" opacity="0.9">

    <path d="M222 360 Q228 410 224 448 L208 448 Q208 405 204 372 Z" fill="url(#skin)"/>
    <path d="M170 444 L196 444 L196 456 L166 456 Z" fill="#5a3b22"/>
    <path d="M230 444 L204 444 L204 456 L234 456 Z" fill="#5a3b22"/>
    <path d="M163 250 Q160 300 178 345 Q200 360 222 345 Q240 300 237 250 Q218 238 200 238 Q182 238 163 250 Z" fill="url(#skin)"/>
    <path d="M176 340 Q200 362 224 340 Q224 356 200 366 Q176 356 176 340 Z" fill="#d8262f"/>
    <path d="M165 258 Q200 274 235 258 L235 248 Q200 264 165 248 Z" fill="#d8262f"/>
    <path d="M163 252 Q138 240 128 215 Q124 200 136 192 Q152 186 160 200 Q170 220 172 246 Z" fill="url(#skin)"/>
    <circle cx="135" cy="200" r="15" fill="url(#skin)"/>
    <path d="M237 252 Q262 240 272 215 Q276 200 264 192 Q248 186 240 200 Q230 220 228 246 Z" fill="url(#skin)"/>
    <circle cx="265" cy="200" r="15" fill="url(#skin)"/>
    <rect x="262" y="40" width="8" height="245" rx="4" fill="#7c5a30" transform="rotate(8 265 170)"/>
    <path d="M282 26 L302 62 L268 58 Z" fill="#cfd6dd"/>
    <circle cx="200" cy="222" r="24" fill="url(#skin)"/>
    <path d="M178 214 Q176 192 200 190 Q224 192 222 214 Q212 200 200 201 Q188 200 178 214 Z" fill="#5c3a1e"/>
    <path d="M200 192 Q206 160 196 130 Q214 150 212 192 Z" fill="#5c3a1e"/>

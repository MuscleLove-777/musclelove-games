  <!-- title -->
  <g text-anchor="middle" font-family="'Hiragino Sans','Noto Sans JP',system-ui,sans-serif" font-weight="900">
    <text x="400" y="330" font-size="72" fill="#e8b53a" stroke="#2b1c05" stroke-width="4" paint-order="stroke">筋肉ハンター</text>
    <text x="400" y="368" font-size="22" fill="#f5f0e1" stroke="#2b1c05" stroke-width="2" paint-order="stroke">MUSCLE HUNTER</text>
    <text x="320" y="404" font-size="19" fill="#f5e6b8">狩って、剥ぎ取って、ビキニを鍛える。狩猟アクション</text>
  </g>
</svg>

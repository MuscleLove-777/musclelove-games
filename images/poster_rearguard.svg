<svg xmlns="http://www.w3.org/2000/svg" width="640" height="420" viewBox="0 0 640 420" role="img" aria-labelledby="title desc">
  <title id="title">マッスルリアガード</title>
  <desc id="desc">筋肉美女部隊の背中と尻で防衛する後方視点カバーシューティング</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#0a0618"/>
      <stop offset="0.42" stop-color="#1d0f33"/>
      <stop offset="0.52" stop-color="#4a1838"/>
      <stop offset="1" stop-color="#0a0710"/>
    </linearGradient>
    <radialGradient id="moon" cx="0.4" cy="0.35" r="0.9">
      <stop offset="0" stop-color="#ffd9e8"/>
      <stop offset="0.7" stop-color="#c2547e"/>
      <stop offset="1" stop-color="#7e2a52"/>
    </radialGradient>
    <radialGradient id="cheek" cx="0.35" cy="0.3" r="1.1">
      <stop offset="0" stop-color="#ff6da0"/>
      <stop offset="0.65" stop-color="#d6224c"/>
      <stop offset="1" stop-color="#7d0f2b"/>
    </radialGradient>
    <linearGradient id="skin" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#e8a87c"/>
      <stop offset="1" stop-color="#c97f55"/>
    </linearGradient>
    <linearGradient id="wall" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#3e4258"/>
      <stop offset="0.2" stop-color="#2a2d40"/>
      <stop offset="1" stop-color="#12131e"/>
    </linearGradient>
  </defs>
  <rect width="640" height="420" fill="url(#bg)"/>
  <!-- stars -->
  <g fill="#cfe2ff" opacity="0.7">
    <circle cx="60" cy="40" r="1.6"/><circle cx="150" cy="86" r="1.2"/><circle cx="240" cy="30" r="1.4"/>
    <circle cx="330" cy="70" r="1.1"/><circle cx="420" cy="36" r="1.5"/><circle cx="560" cy="90" r="1.2"/>
    <circle cx="610" cy="40" r="1.4"/><circle cx="90" cy="120" r="1.1"/><circle cx="500" cy="60" r="1.3"/>
  </g>
  <!-- ringed moon -->
  <circle cx="500" cy="110" r="74" fill="url(#moon)"/>
  <ellipse cx="500" cy="116" rx="118" ry="26" fill="none" stroke="#ff8cbe" stroke-opacity="0.45" stroke-width="9" transform="rotate(-12 500 116)"/>
  <!-- city -->
  <g fill="#190d28">
    <rect x="0" y="130" width="70" height="90"/><rect x="80" y="110" width="56" height="110"/>
    <rect x="150" y="142" width="78" height="80"/><rect x="240" y="100" width="60" height="122"/>
    <rect x="315" y="135" width="90" height="88"/><rect x="420" y="118" width="58" height="104"/>
    <rect x="490" y="140" width="84" height="82"/><rect x="586" y="112" width="54" height="110"/>
  </g>
  <!-- perspective grid ground -->
  <rect x="0" y="218" width="640" height="202" fill="#170c1a"/>
  <g stroke="#ff4d8d" stroke-opacity="0.16">
    <line x1="320" y1="218" x2="-160" y2="420"/><line x1="320" y1="218" x2="80" y2="420"/>
    <line x1="320" y1="218" x2="320" y2="420"/><line x1="320" y1="218" x2="560" y2="420"/>
    <line x1="320" y1="218" x2="800" y2="420"/>
    <line x1="0" y1="252" x2="640" y2="252"/><line x1="0" y1="300" x2="640" y2="300"/><line x1="0" y1="368" x2="640" y2="368"/>
  </g>
  <!-- enemy drones -->
  <g>
    <polygon points="180,196 200,188 220,196 200,206" fill="#2a2e40" stroke="#0a0c14"/>
    <circle cx="200" cy="196" r="5" fill="#ff2d3a"/>
    <polygon points="420,176 436,170 452,176 436,184" fill="#2a2e40" stroke="#0a0c14"/>
    <circle cx="436" cy="176" r="4" fill="#ff7d4d"/>
    <line x1="200" y1="200" x2="330" y2="320" stroke="#ff2d3a" stroke-opacity="0.6" stroke-dasharray="7 6" stroke-width="2"/>
  </g>
  <!-- cover wall -->
  <rect x="0" y="330" width="640" height="90" fill="url(#wall)"/>
  <rect x="0" y="330" width="640" height="4" fill="#8caaff" opacity="0.4"/>
  <g opacity="0.55">
    <rect x="0" y="340" width="640" height="14" fill="#14141c"/>
    <g fill="#ffd95e">
      <polygon points="10,354 28,340 46,340 28,354"/><polygon points="64,354 82,340 100,340 82,354"/>
      <polygon points="118,354 136,340 154,340 136,354"/><polygon points="172,354 190,340 208,340 190,354"/>
      <polygon points="226,354 244,340 262,340 244,354"/><polygon points="280,354 298,340 316,340 298,354"/>
      <polygon points="334,354 352,340 370,340 352,354"/><polygon points="388,354 406,340 424,340 406,354"/>
      <polygon points="442,354 460,340 478,340 460,354"/><polygon points="496,354 514,340 532,340 514,354"/>
      <polygon points="550,354 568,340 586,340 568,354"/><polygon points="604,354 622,340 640,340 622,354"/>
    </g>
  </g>
  <!-- girl from behind (center) -->
  <g>
    <!-- thighs -->
    <path d="M285 392 Q282 360 296 344 L316 348 Q310 376 306 414 L288 414 Z" fill="url(#skin)"/>
    <path d="M355 392 Q358 360 344 344 L324 348 Q330 376 334 414 L352 414 Z" fill="url(#skin)"/>
    <!-- glutes -->
    <ellipse cx="298" cy="330" rx="33" ry="35" fill="url(#cheek)" stroke="#1c0a14" stroke-width="2.4"/>
    <ellipse cx="342" cy="330" rx="33" ry="35" fill="url(#cheek)" stroke="#1c0a14" stroke-width="2.4"/>
    <path d="M276 312 Q320 296 364 312 L356 290 L284 290 Z" fill="#7d0f2b"/>
    <!-- belt -->
    <rect x="284" y="284" width="72" height="11" rx="5" fill="#1a1622"/>
    <rect x="312" y="286" width="16" height="8" rx="2" fill="#ffd95e"/>
    <!-- back -->
    <path d="M286 290 Q282 246 268 212 Q290 190 320 188 Q350 190 372 212 Q358 246 354 290 Q320 300 286 290 Z" fill="url(#skin)"/>
    <line x1="320" y1="212" x2="320" y2="284" stroke="#8a4b28" stroke-opacity="0.5" stroke-width="2.4"/>
    <path d="M276 226 Q294 240 298 268" stroke="#8a4b28" stroke-opacity="0.4" fill="none" stroke-width="2"/>
    <path d="M364 226 Q346 240 342 268" stroke="#8a4b28" stroke-opacity="0.4" fill="none" stroke-width="2"/>
    <!-- X harness -->
    <line x1="288" y1="212" x2="350" y2="282" stroke="#d6224c" stroke-width="7"/>
    <line x1="352" y1="212" x2="290" y2="282" stroke="#d6224c" stroke-width="7"/>
    <!-- shoulders/arms -->
    <ellipse cx="272" cy="212" rx="13" ry="15" fill="url(#skin)"/>
    <ellipse cx="368" cy="212" rx="13" ry="15" fill="url(#skin)"/>
    <!-- head + ponytail -->
    <circle cx="320" cy="172" r="22" fill="#23202b"/>
    <circle cx="320" cy="166" r="6" fill="#ff2d3a"/>
    <path d="M324 150 Q352 168 340 214 Q334 222 328 214 Q336 180 318 156 Z" fill="#23202b"/>
    <!-- rifle -->
    <g transform="rotate(-38 352 196)">
      <rect x="340" y="190" width="86" height="9" rx="3" fill="#1c1c26" stroke="#000" stroke-width="1"/>
      <rect x="330" y="186" width="18" height="17" rx="3" fill="#10101a"/>
      <rect x="372" y="187" width="8" height="4" rx="1.5" fill="#ffd95e"/>
      <circle cx="428" cy="194" r="9" fill="#ffcf6e" opacity="0.9"/>
    </g>
  </g>
  <!-- title -->
  <g font-family="Segoe UI, sans-serif" font-weight="900">
    <text x="22" y="56" font-size="44" font-style="italic" fill="#ffffff" stroke="#000" stroke-width="1.6">MUSCLE</text>
    <text x="22" y="100" font-size="44" font-style="italic" fill="#ff4d8d" stroke="#000" stroke-width="1.6">REAR GUARD</text>
    <text x="24" y="128" font-size="17" fill="#53e0ff">マッスル・リアガード</text>
    <text x="22" y="404" font-size="20" fill="#ffd95e" stroke="#000" stroke-width="0.8">最強の尻（リア）が、最後の盾。</text>
  </g>
</svg>

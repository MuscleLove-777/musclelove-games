    <rect x="60" y="90" width="30" height="30" rx="8" fill="url(#tileA)"/>
    <rect x="90" y="90" width="30" height="30" rx="8" fill="url(#tileA)"/>
    <rect x="120" y="90" width="30" height="30" rx="8" fill="url(#tileA)"/>

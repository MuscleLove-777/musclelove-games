<svg xmlns="http://www.w3.org/2000/svg" width="640" height="360" viewBox="0 0 640 360" role="img" aria-labelledby="title desc">
  <title id="title">筋肉マットフィット</title>
  <desc id="desc">Poster for the MuscleLove placement puzzle</desc>
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1b1331"/>
      <stop offset="100%" stop-color="#0e1525"/>
    </linearGradient>
    <linearGradient id="tileA" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ffd166"/>
      <stop offset="100%" stop-color="#ff8552"/>

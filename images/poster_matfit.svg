    <linearGradient id="tileB" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#74f0b3"/>
      <stop offset="100%" stop-color="#38c996"/>
    </linearGradient>
  </defs>
  <rect width="640" height="360" rx="28" fill="url(#bg)"/>
  <circle cx="580" cy="60" r="82" fill="#ff8552" fill-opacity="0.16"/>
  <circle cx="90" cy="310" r="96" fill="#74f0b3" fill-opacity="0.12"/>
  <g transform="translate(40 48)">

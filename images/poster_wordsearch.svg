<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 400" width="600" height="400">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#1a1226"/>
      <stop offset="1" stop-color="#2a1838"/>
    </linearGradient>
    <linearGradient id="pink" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#ff8fb0"/>
      <stop offset="1" stop-color="#ff2d3a"/>
    </linearGradient>
  </defs>
  <rect width="600" height="400" fill="url(#bg)"/>
  <g font-family="system-ui,sans-serif" font-weight="800">
    <text x="300" y="70" text-anchor="middle" font-size="40" fill="url(#pink)">筋トレ単語探し</text>
    <text x="300" y="102" text-anchor="middle" font-size="20" fill="#b8a8cc">MUSCLE WORD SEARCH</text>
  </g>
  <g transform="translate(150,130)">
    <rect width="300" height="220" rx="16" fill="#241a34"/>
    <g font-family="monospace" font-weight="800" font-size="26" fill="#f5eef8" text-anchor="middle">
      <!-- highlighted word SQUAT diagonal -->
      <g>
        <rect x="18" y="18" width="34" height="34" rx="7" fill="#2ecc71"/>
        <rect x="70" y="70" width="34" height="34" rx="7" fill="#2ecc71"/>
        <rect x="122" y="122" width="34" height="34" rx="7" fill="#2ecc71"/>
        <rect x="174" y="174" width="34" height="34" rx="7" fill="#ffcf4d"/>
      </g>
      <text x="35" y="43">S</text><text x="87" y="43">B</text><text x="139" y="43">P</text><text x="191" y="43">L</text><text x="243" y="43">A</text>
      <text x="35" y="95">R</text><text x="87" y="95">Q</text><text x="139" y="95">U</text><text x="191" y="95">R</text><text x="243" y="95">B</text>
      <text x="35" y="147">C</text><text x="87" y="147">G</text><text x="139" y="147">U</text><text x="191" y="147">Y</text><text x="243" y="147">M</text>
      <text x="35" y="199">F</text><text x="87" y="199">A</text><text x="139" y="199">P</text><text x="191" y="199">T</text><text x="243" y="199">S</text>
    </g>
  </g>
  <text x="300" y="380" text-anchor="middle" font-family="system-ui,sans-serif" font-size="15" fill="#ff5c8a">最初と最後の文字をタップ！💪 MuscleLove</text>
</svg>

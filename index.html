    (function() {
      // ---- ジャンル → CSS クラス判定（部分一致, 上から順に評価） ----
      function genreClass(genre) {
        var g = (genre || '').toLowerCase();
        // 3D は最優先（「3d tetris」「fps 3d」「action 3d」「endless runner 3d」など）
        if (g.indexOf('3d') !== -1) return 'cat-3d';
        // Puzzle 系
        if (/(puzzle|match-3|match3|slide|2048|sokoban|maze|bubble shooter)/.test(g)) return 'cat-puzzle';
        // Quiz/記憶系（先に評価して action と被るものを掬う）
        if (/(quiz|typing|hangman|wordle|spot diff|memory|simon|tsum)/.test(g)) return 'cat-quiz';
        // RPG/戦略
        if (/(roguelike|roguelite|survivor|tower defense|battle|othello|minesweeper|connect4)/.test(g)) return 'cat-rpg';
        // Action 系
        if (/(action|tower stack|reaction|catch|whack|darts|pong|snake|breakout|tetris|pinball|invaders)/.test(g)) return 'cat-action';
        // Fortune / 運勢 / バラエティ
        if (/(gacha|roulette|slots|fortune|personality|daily|tier list|before-after|vs vote|flick|calendar|omikuji|shindan|rhythm|swipe)/.test(g)) return 'cat-fortune';
        return 'cat-other';
      }

      // ---- NEW 3D 対象判定（URL先頭で musclelove- フラッグシップ3本） ----
      function isFlagship3D(url) {
        return /^https?:\/\/(musclelove-fps|musclelove-slasher|musclelove-runner)\./i.test(url || '');
      }

      // ---- 1枚のカード DOM を生成 ----
      function buildCard(g) {
        var a = document.createElement('a');
        a.href = g.url;
        a.target = '_blank';
        a.rel = 'noopener noreferrer';
        a.className = 'game-card ' + genreClass(g.genre);

        var flagship = isFlagship3D(g.url);
        if (flagship) a.className += ' is-new-3d';

        a.innerHTML =
          (flagship ? '<div class="ribbon-new-3d">NEW 3D</div>' : '') +
          '<div class="card-image"><img src="' + g.img + '" alt="' + g.title + '" loading="lazy"></div>' +
          '<div class="card-body">' +
            '<h2 class="card-title">' + g.title + '</h2>' +
            '<span class="card-genre">' + g.genre + '</span>' +
            '<p class="card-desc">' + g.desc_ja + '<span class="card-desc-en">' + g.desc_en + '</span></p>' +
            '<span class="card-btn">遊ぶ！ <span class="btn-en">/ Play!</span></span>' +
          '</div>';
        return a;
      }

      // ---- B-3: 先に featured-grid に 3D フラッグシップ3本を投入 ----
      var featured = document.getElementById('featured-grid');
      var featuredOrder = ['musclelove-fps', 'musclelove-slasher', 'musclelove-runner'];
      featuredOrder.forEach(function(key) {
        for (var i = 0; i < GAMES.length; i++) {
          if ((GAMES[i].url || '').indexOf('https://' + key + '.') === 0) {
            featured.appendChild(buildCard(GAMES[i]));
            break;
          }
        }
      });
      // featured が空なら隠す（保険）
      if (!featured.children.length) {
        var fSection = document.getElementById('featured-3d');
        if (fSection) fSection.style.display = 'none';
      }

      // ---- 既存通り：全ゲームを games-grid に逆順で投入（リボンも付く） ----
      var grid = document.getElementById('games-grid');
      GAMES.slice().reverse().forEach(function(g) {
        grid.appendChild(buildCard(g));
      });
    })();

    // Floating muscle emoji particles
    (function() {
      var container = document.getElementById('particles');
      var emojis = ['\uD83D\uDCAA', '\uD83D\uDD25', '\u2B50', '\uD83C\uDFC6', '\u26A1'];
      var count = 15;
      for (var i = 0; i < count; i++) {
        var span = document.createElement('span');
        span.className = 'particle';
        span.textContent = emojis[i % emojis.length];
        span.style.left = Math.random() * 100 + '%';
        span.style.animationDelay = (Math.random() * 12) + 's';
        span.style.animationDuration = (10 + Math.random() * 10) + 's';
        span.style.fontSize = (14 + Math.random() * 18) + 'px';
        span.style.opacity = 0.15 + Math.random() * 0.15;
        container.appendChild(span);
      }
    })();
  </script>
